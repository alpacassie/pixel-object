<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pixel-object</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --fg: #2a2623;
    --muted: #8a8178;
    --accent: #c96d4f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Fraunces', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4rem 1.5rem;
  }
  h1 {
    font-weight: 500;
    font-size: 2.5rem;
    margin: 0 0 0.5rem 0;
    letter-spacing: -0.01em;
  }
  p.tagline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
    margin: 0 0 3rem 0;
    letter-spacing: 0.04em;
  }
  .dropzone {
    border: 1.5px dashed var(--muted);
    border-radius: 14px;
    padding: 3rem 2rem;
    text-align: center;
    max-width: 480px;
    width: 100%;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .dropzone:hover, .dropzone.drag {
    border-color: var(--accent);
    background: #fff;
  }
  .dropzone p {
    margin: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    color: var(--muted);
  }
  input[type=file] { display: none; }
  .status {
    margin-top: 2rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
    min-height: 1.4em;
    text-align: center;
    max-width: 480px;
  }
  .result {
    margin-top: 2rem;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
  }
  .result.show { display: flex; }
  .result img {
    max-width: 320px;
    image-rendering: pixelated;
    background:
      linear-gradient(45deg, #eee 25%, transparent 25%),
      linear-gradient(-45deg, #eee 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #eee 75%),
      linear-gradient(-45deg, transparent 75%, #eee 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    border-radius: 8px;
  }
  .download {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    text-decoration: none;
    color: var(--fg);
    border-bottom: 1px solid var(--fg);
    padding-bottom: 2px;
  }
</style>
</head>
<body>
  <h1>pixel-object</h1>
  <p class="tagline">photo → pixel art</p>

  <label class="dropzone" id="dropzone">
    <input type="file" id="file" accept="image/*">
    <p>click or drop an image</p>
  </label>

  <div class="status" id="status"></div>

  <div class="result" id="result">
    <img id="resultImg" alt="pixel art result">
    <a class="download" id="download" download="pixel-object.png">download png</a>
  </div>

<script>
  // Downscale the longest edge to this before upload. Keeps the request
  // under Vercel's 4.5MB body cap, and the model downsamples anyway.
  const MAX_SIDE = 1536;

  const dz = document.getElementById('dropzone');
  const input = document.getElementById('file');
  const status = document.getElementById('status');
  const result = document.getElementById('result');
  const resultImg = document.getElementById('resultImg');
  const download = document.getElementById('download');

  dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
  dz.addEventListener('drop', (e) => {
    e.preventDefault();
    dz.classList.remove('drag');
    if (e.dataTransfer.files[0]) handle(e.dataTransfer.files[0]);
  });
  input.addEventListener('change', (e) => {
    if (e.target.files[0]) handle(e.target.files[0]);
  });

  async function handle(file) {
    result.classList.remove('show');
    status.textContent = 'resizing…';
    let blob;
    try {
      blob = await resize(file);
    } catch (err) {
      status.textContent = 'error: ' + err.message;
      return;
    }
    status.textContent = 'generating pixel art (this takes a few seconds)…';
    const form = new FormData();
    form.append('photo', blob, 'upload.png');
    try {
      const r = await fetch('/generate', { method: 'POST', body: form });
      if (!r.ok) {
        const text = await r.text();
        throw new Error(text || ('HTTP ' + r.status));
      }
      const out = await r.blob();
      const url = URL.createObjectURL(out);
      resultImg.src = url;
      download.href = url;
      result.classList.add('show');
      status.textContent = '';
    } catch (err) {
      status.textContent = 'error: ' + err.message;
    }
  }

  function resize(file) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, MAX_SIDE / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(
          (blob) => blob ? resolve(blob) : reject(new Error('resize failed')),
          'image/png'
        );
      };
      img.onerror = () => reject(new Error('could not read image'));
      img.src = URL.createObjectURL(file);
    });
  }
</script>
</body>
</html>
